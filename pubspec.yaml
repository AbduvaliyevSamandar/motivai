name: motivai
description: "AI-powered Student Motivation Platform - Flutter Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.0
  riverpod: ^2.4.0
  
  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.1
  
  # JSON Serialization
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  
  # Image Picker (Profile photo)
  image_picker: ^1.0.4
  
  # Notifications
  flutter_local_notifications: ^16.1.0
  
  # UI & Design
  flutter_svg: ^2.0.7
  google_fonts: ^6.1.0
  material_design_icons_flutter: ^7.0.7296
  
  # Charts
  fl_chart: ^0.63.0
  
  # Navigation
  go_router: ^12.0.1
  
  # Animation
  animations: ^2.0.8
  shimmer: ^3.0.0
  
  # Date & Time
  intl: ^0.19.0
  
  # Auth Storage
  flutter_secure_storage: ^9.0.0
  
  # Image Handling
  cached_network_image: ^3.3.0
  
  # Loading
  flutter_spinkit: ^5.2.0
  loading_animation_widget: ^1.2.0+4
  
  # Toast & Notifications
  fluttertoast: ^8.2.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  
  # Testing
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/icons/

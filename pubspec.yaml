name: motivai
description: AI-powered student motivation platform
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP
  http: ^1.2.0

  # Token xavfsiz saqlash (ilovadan chiqsa ham qoladi)
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI Components
  fl_chart: ^0.66.2
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  flutter_svg: ^2.0.9

  # Utils
  intl: ^0.19.0

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Voice input
  speech_to_text: ^7.0.0

  # Android home widget
  home_widget: ^0.6.0

  # Network status (offline detection)
  connectivity_plus: ^6.0.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # External URLs (privacy / terms)
  url_launcher: ^6.2.6

  # Lucide icon library — base set Linear / Vercel / Notion / Supabase
  # ship with. Single line-stroke style.
  lucide_icons: ^0.257.0

  # Iconsax — Apple-style icon system (linear / bold) used in premium
  # Dribbble UIs; we use it for the most prominent decorative icons
  # (streak flame, XP star, trophy, target, book, rocket).
  iconsax_flutter: ^1.0.0

  # Hugeicons — 2024-vintage icon library with extremely refined,
  # multi-stroke designs; used selectively where Lucide/Iconsax don't
  # have the right aesthetic.
  hugeicons: ^0.0.11

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0A1628"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/

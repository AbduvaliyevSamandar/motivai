name: motivai
description: AI-powered student motivation platform
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP
  http: ^1.2.0

  # Secure token storage — ilovadan chiqsa ham saqlaydi
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI
  fl_chart: ^0.66.2
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  lottie: ^3.0.0

  # Utils
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

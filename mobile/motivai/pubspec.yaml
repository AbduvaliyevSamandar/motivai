name: motivai
description: Sun'iy intellekt yordamida shaxsiy motivatsiya platformasi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  
  # State management
  provider: ^6.1.1
  flutter_riverpod: ^2.3.6

  
  # HTTP & API
  dio: ^5.4.0
  
  # Local storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI Components
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  
  # Charts & Progress
  fl_chart: ^0.66.2
  percent_indicator: ^4.2.3
  
  # Chat UI
  flutter_chat_ui: ^1.6.12
  flutter_chat_types: ^3.6.2
  
  # Navigation
  go_router: ^13.0.0
  
  # Icons
  cupertino_icons: ^1.0.6
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  
  # Image picker
  image_picker: ^1.0.7
  
  # Connectivity
  connectivity_plus: ^5.0.2
  
  # Animations
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600

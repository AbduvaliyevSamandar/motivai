<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotivAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #08091a 0%, #16193d 100%);
      color: #f1f1fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .card {
      max-width: 480px;
      background: rgba(22, 25, 51, 0.8);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      border: 1px solid rgba(168, 85, 247, 0.3);
      padding: 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(168, 85, 247, 0.3);
    }
    .logo {
      font-size: 56px;
      margin-bottom: 8px;
    }
    h1 {
      background: linear-gradient(135deg, #a855f7, #00d9ff, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .tagline {
      color: #a5a8c7;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .link {
      display: block;
      padding: 14px 20px;
      background: rgba(168, 85, 247, 0.15);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 14px;
      color: #f1f1fa;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
    }
    .link:hover {
      background: rgba(168, 85, 247, 0.25);
      transform: translateY(-2px);
    }
    .footer {
      margin-top: 32px;
      color: #6c6f8e;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⚡</div>
    <h1>MotivAI</h1>
    <p class="tagline">AI bilan motivatsion reja — har kuni bir qadam</p>

    <div class="links">
      <a class="link" href="privacy.html">📜 Privacy Policy / Maxfiylik</a>
      <a class="link" href="terms.html">📋 Terms of Service / Shartlar</a>
      <a class="link" href="https://github.com/AbduvaliyevSamandar/motivai">💻 GitHub</a>
    </div>

    <p class="footer">© 2026 MotivAI · Made in 🇺🇿 Uzbekistan</p>
  </div>
</body>
</html>

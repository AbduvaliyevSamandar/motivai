services:
  # ─── Backend API (FastAPI + MongoDB) ─────────────────────
  - type: web
    name: motivai-backend
    env: python
    plan: starter

    buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT

    region: oregon

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: 'false'
      - key: MONGODB_URL
        fromDatabase:
          name: motivai-db
          property: connectionString
      - key: DATABASE_NAME
        value: motivai_prod
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: CORS_ORIGINS
        value: '["https://motivai.vercel.app", "https://motivai.app", "https://motivai-web.onrender.com"]'
      - key: LOG_LEVEL
        value: info

    healthCheckPath: /health
    healthCheckTimeout: 10

  # ─── Flutter Web (Static site) ───────────────────────────
  - type: web
    name: motivai-web
    env: static

    buildCommand: |
      if [ ! -d "flutter" ]; then
        git clone https://github.com/flutter/flutter.git -b stable --depth 1
      fi
      export PATH="$PATH:$(pwd)/flutter/bin"
      flutter --version
      flutter config --enable-web
      flutter pub get
      flutter build web --release --no-wasm-dry-run

    staticPublishPath: ./build/web

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

    pullRequestPreviewsEnabled: false

  # ─── Database ────────────────────────────────────────────
  - type: pserv
    name: motivai-db
    plan: starter

    ipAllowList: []
    # NOTE: Free tier has limited storage (512MB)

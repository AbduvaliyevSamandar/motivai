version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:7.0
    container_name: motivai_mongodb
    restart: always
    
    ports:
      - "27017:27017"
    
    volumes:
      - mongodb_data:/data/db
      - ./database/init.js:/docker-entrypoint-initdb.d/init.js:ro
    
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password_change_in_production
      MONGO_INITDB_DATABASE: motivai_prod
    
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    networks:
      - motivai_network

  # FastAPI Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    
    container_name: motivai_backend
    restart: always
    
    ports:
      - "8000:8000"
    
    environment:
      ENVIRONMENT: production
      DEBUG: 'false'
      MONGODB_URL: mongodb://admin:admin_password_change_in_production@mongodb:27017/motivai_prod?authSource=admin
      DATABASE_NAME: motivai_prod
      SECRET_KEY: ${SECRET_KEY:-change-secret-key-in-production-min-32-chars}
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5000", "http://localhost"]'
    
    depends_on:
      mongodb:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    volumes:
      - ./backend:/app
    
    networks:
      - motivai_network
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: motivai_nginx
    restart: always
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./frontend_build:/usr/share/nginx/html:ro
    
    depends_on:
      - backend
    
    networks:
      - motivai_network
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongodb_data:
    driver: local

networks:
  motivai_network:
    driver: bridge
